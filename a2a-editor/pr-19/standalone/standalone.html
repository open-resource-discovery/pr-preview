<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2A Editor - Standalone Demo</title>
    <link rel="stylesheet" href="./agent-playground.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      #editor {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="editor"></div>

    <script src="./a2a-editor.js"></script>
    <script>
      // Initialize the A2A Editor
      document.addEventListener("DOMContentLoaded", function () {
        const editor = A2AEditor.render("#editor", {
          showChat: true,
          showValidation: false,
          showSettings: true,
          defaultTab: "overview",
        });

        // Log version
        console.log("A2A Editor version:", A2AEditor.version);

        // Example: destroy editor (uncomment to test)
        // setTimeout(() => editor.destroy(), 5000);
      });
    </script>
  </body>
</html>
