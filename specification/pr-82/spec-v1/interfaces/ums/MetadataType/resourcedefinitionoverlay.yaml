apiVersion: 'metadata-service.resource.api.sap/v6alpha1'
type: 'MetadataType'
metadata:
  name: 'resourcedefinitionoverlay'
  path: '/sap/core/ucl/metadata/ord/v1'
  labels: {}
spec:
  typeName: 'ResourceDefinitionOverlay'
  key:
    - 'id'
  visibility: 'public'
  embedded: false
  description: "⚠️ ALPHA: This specification is in alpha and subject to change.\n\nDescribes an overlay document for patching resource definitions (e.g. OpenAPI, AsyncAPI, OData CSDL, MCP)\nor ORD resources, without modifying the original files.\n\nPatches use concept-level selectors that are independent of the internal structure of the target format,\nmaking overlays resilient to format changes (e.g. OpenAPI 3.0 → 3.1, OData CSDL JSON → XML).\nA JSON Path selector is available as a generic fallback for JSON/YAML-based targets.\n\nConceptual selector levels (from high to low):\n  - Resource level: ORD ID (resolved via the ORD registry)\n  - Operation level: operationId (REST operation, MCP tool, AsyncAPI operation, …)\n  - Entity type level: entityTypeId (OData EntitySet, CSN entity, JSON Schema object, …)\n  - Property level: propertyId (OData Property, CSN element, JSON Schema property, …)\n  - Generic fallback: jsonPath (any JSON/YAML document, structure-bound)"
  metadataProperties:
    - name: 'id'
      type: 'guid'
      mandatory: true
      unique: true
      description: 'UMS ID (globally unique), used for relations.'
    - name: '$schema'
      type: 'string'
      description: "Optional [URL](https://tools.ietf.org/html/rfc3986) to the Resource Definition Overlay schema (defined as a JSON Schema).\nIf provided, this enables code intelligence and validation in supported editors (like VSCode) and tools."
    - name: 'resourceDefinitionOverlay'
      type: 'string'
      description: 'Version of the Resource Definition Overlay specification.'
      mandatory: true
  customTypeDefinitions: []
  metadataRelations:
    - propertyName: 'info'
      relatedTypeName: 'OverlayInfo'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
    - propertyName: 'target'
      relatedTypeName: 'OverlayTarget'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      description: "Reference to the single resource being patched by this overlay.\nMUST provide at least one identifier: an ORD ID, a URL, or one or more correlationIds.\nMultiple identifiers are treated as all pointing to the same resource,\nproviding redundant ways to resolve it."
    - propertyName: 'patches'
      relatedTypeName: 'Patch'
      relatedTypeNamespace: '/sap/core/ucl/metadata/ord/v1'
      description: "Ordered sequence of patches to apply to the targeted resource(s).\nPatches are applied in the order listed."
      mandatory: true
