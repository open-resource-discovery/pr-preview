      <stop offset="0%" stop-color="#0098ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1b1b1d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1b1b1d"/>
